<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 For My Love 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Itim',cursive;
}

body{

height:100vh;
overflow:hidden;

background:linear-gradient(135deg,#FFD6E8,#FFECC7,#E0F7FF);

display:flex;
justify-content:center;
align-items:center;

}

.card{

width:340px;
background:white;
border-radius:30px;
padding:30px;

box-shadow:0 10px 40px rgba(0,0,0,.15);

text-align:center;

position:relative;
z-index:2;

}

img{

width:160px;
height:160px;
object-fit:cover;
border-radius:50%;
border:8px solid #FFD3E3;
margin-bottom:20px;

}

h1{

color:#ff4f81;
font-size:34px;

}

p{

margin-top:15px;
line-height:1.7;
color:#666;

}

button{

margin-top:25px;

padding:12px 24px;

border:none;

border-radius:50px;

background:#ff4f81;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.08);

background:#ff2f69;

}

#loveMessage{

margin-top:18px;

font-size:22px;

color:#ff4f81;

display:none;

animation:fade .8s;

}

@keyframes fade{

from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}

}

.heart{

position:absolute;

color:#ff5c8a;

font-size:20px;

animation:float linear infinite;

opacity:.8;

}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

30%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.6);
opacity:0;
}

}

</style>

</head>
<body>

<div class="card">

<h1> 🐷🕌 </h1>

<p>

ขอให้วันนี้เป็นวันที่ดีนะคะ <br>

ตั้งใจทำงานน้าาาา<br><br>

เค้าเป็นกำลังใจให้คุณเสมอ 💕

</p>

<button onclick="showLove()">

❤️ลองกดตรงนี้จิ❤️

</button>

<img src="135875.jpg" alt="">

<div id="loveMessage">

🍗🧜‍♀❤️👻🦊

</div>

</div>

<audio id="music">

<source src="YOUR_MUSIC.mp3">

</audio>

<script>

function showLove(){

document.getElementById("loveMessage").style.display="block";

document.getElementById("music").play();

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*4+4)+"s";

heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);

}

setInterval(createHeart,250);

</script>

</body>
</html>
